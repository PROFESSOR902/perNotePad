    function renderTabs(tabs) {
      const tabButtons = document.querySelector('.tab-buttons');
      const tabContent = document.querySelector('.tab-content');
      tabButtons.innerHTML = '';
      tabContent.innerHTML = '';
  
      tabs.forEach((tab, i) => {
        const btn = document.createElement('button');
        btn.textContent = tab.title;
        btn.className = i === 0 ? 'active' : '';
        btn.onclick = () => openTab(i);
        tabButtons.appendChild(btn);
  
        const pane = document.createElement('div');
        pane.className = `tab-pane ${i === 0 ? 'active' : ''}`;
        pane.dataset.title = tab.title;
  
        const textarea = document.createElement('textarea');
        textarea.style.width = '100%';
        textarea.style.height = '300px';
        textarea.value = tab.content;
  
        pane.appendChild(textarea);
        tabContent.appendChild(pane);
      });
    }
  
    function openTab(index) {
      document.querySelectorAll('.tab-buttons button').forEach((b, i) => {
        b.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.tab-pane').forEach((p, i) => {
        p.classList.toggle('active', i === index);
      });
    }

    function getNoteId() {

    async function saveToSupabase() {
      const id = getNoteId();
      const tabPanes = document.querySelectorAll('.tab-pane');
      const tabs = Array.from(tabPanes).map(pane => ({
        title: pane.dataset.title,
        content: pane.querySelector('textarea').value
      }));
  
      const { error } = await supabaseClient
        .from('notepads')
        .upsert({ id, tabs }, { onConflict: 'id' })
        .select()
        .maybeSingle();
      
      alert(error ? '❌ Save failed' : '✅ Saved!');
    }
